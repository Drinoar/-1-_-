name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 🔹 Checkout code
      uses: actions/checkout@v3

    - name: 🔹 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 🔹 Install dependencies
      run: |
        pip install pytest pytest-html flake8

    - name: 🔹 Run tests
      run: |
        pytest main.py

    - name: 🔹 Check PEP8 (flake8)
      run: |
        flake8 .